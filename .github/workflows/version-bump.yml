name: Auto Version Bump

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  version-bump:
    runs-on: ubuntu-latest

    # Skip if the push was the version bump commit itself
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version to')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Determine bump type from commit message
        id: bump
        env:
          MSG: ${{ github.event.head_commit.message }}
        run: |
          FIRST_LINE=$(echo "$MSG" | head -1)

          if echo "$FIRST_LINE" | grep -qiE '^[a-z]+(\(.+\))?!:' || echo "$MSG" | grep -qi 'BREAKING CHANGE:'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$FIRST_LINE" | grep -qiE '^feat(\(.+\))?:'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          elif echo "$FIRST_LINE" | grep -qiE '^fix(\(.+\))?:'; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
          else
            echo "type=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        if: steps.bump.outputs.type != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          npm version ${{ steps.bump.outputs.type }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${VERSION}"
          git tag "v${VERSION}"
          git push --atomic origin main "v${VERSION}"
